<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"><!-- ==================== CSS STYLES (style.css) ==================== -->
  <style>
    /* ===== BASE STYLES ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1E3A5F 0%, #16324F 50%, #0F2C4D 100%);
      color: #E6F1FA;
      overflow-x: hidden;
    }

    /* ===== CSS VARIABLES ===== */
    :root {
      --sidebar-bg: linear-gradient(180deg, #1B3B5A 0%, #122C44 100%);
      --sidebar-text: #E6F1FA;
      --sidebar-active-bg: #2B5C88;
      --sidebar-active-border: #2BB0ED;
      --sidebar-hover: #244B70;
      --primary-blue: linear-gradient(135deg, #2BB0ED 0%, #1994D6 100%);
      --primary-blue-hover: linear-gradient(135deg, #38C6F4 0%, #2BB0ED 100%);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-primary: #FFFFFF;
      --text-secondary: #C9D8E5;
      --text-muted: #94AFC3;
      --chart-primary: #2BB0ED;
      --chart-success: #22C55E;
      --chart-warning: #FACC15;
      --chart-danger: #FF6B6B;
      --glass-shadow: 0 12px 30px rgba(0,0,0,0.35);
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.15);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.2);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.3);
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-glass: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --grid-line: rgba(255,255,255,0.08);
    }

    /* ===== LAYOUT STRUCTURE ===== */
    .app-wrapper {
      display: flex;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    /* ===== SIDEBAR STYLES ===== */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--sidebar-bg);
      height: 100%;
      display: flex;
      flex-direction: column;
      transition: var(--transition);
      position: relative;
      z-index: 50;
      border-right: 1px solid var(--glass-border);
    }

    .sidebar.collapsed {
      width: 70px;
      min-width: 70px;
    }

    .sidebar-header {
      padding: 1.25rem;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .sidebar-logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #2BB0ED, #1994D6);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 15px rgba(43, 176, 237, 0.3);
    }

    .sidebar-logo svg {
      width: 24px;
      height: 24px;
      color: white;
    }

    .sidebar-title {
      color: var(--text-primary);
      font-size: 1.125rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      transition: var(--transition);
    }

    .sidebar.collapsed .sidebar-title {
      opacity: 0;
      width: 0;
    }

    .sidebar-nav {
      flex: 1;
      padding: 1rem 0.75rem;
      overflow-y: auto;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      border-radius: var(--radius-md);
      color: var(--text-muted);
      text-decoration: none;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
      border-left: 4px solid transparent;
    }

    .nav-item:hover {
      background: var(--sidebar-hover);
      color: var(--text-secondary);
    }

    .nav-item.active {
      background: var(--sidebar-active-bg);
      color: var(--text-primary);
      border-left-color: var(--sidebar-active-border);
    }

    .nav-item svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .nav-item span {
      overflow: hidden;
      transition: var(--transition);
    }

    .sidebar.collapsed .nav-item span {
      opacity: 0;
      width: 0;
    }

    .sidebar-toggle {
      position: absolute;
      right: -12px;
      top: 70px;
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #2BB0ED, #1994D6);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--glass-shadow);
      transition: var(--transition);
      z-index: 60;
    }

    .sidebar-toggle:hover {
      background: linear-gradient(135deg, #38C6F4, #2BB0ED);
      transform: scale(1.1);
    }

    .sidebar-toggle svg {
      width: 14px;
      height: 14px;
      color: white;
      transition: var(--transition);
    }

    .sidebar.collapsed .sidebar-toggle svg {
      transform: rotate(180deg);
    }

    /* ===== MAIN CONTENT AREA ===== */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    /* ===== TOP NAVBAR ===== */
    .top-navbar {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--glass-shadow);
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
    }

    .navbar-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .mobile-toggle {
      display: none;
      background: none;
      border: none;
      padding: 0.5rem;
      cursor: pointer;
      color: var(--text-primary);
    }

    .page-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .navbar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .search-box {
      position: relative;
      display: none;
    }

    @media (min-width: 768px) {
      .search-box {
        display: block;
      }
    }

    .search-input {
      padding: 0.5rem 1rem 0.5rem 2.5rem;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      background: var(--glass-bg);
      font-size: 0.875rem;
      width: 200px;
      color: var(--text-secondary);
      transition: var(--transition);
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--chart-primary);
      box-shadow: 0 0 0 3px rgba(43, 176, 237, 0.2);
      width: 260px;
    }

    .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-muted);
    }

    .notification-wrapper {
      position: relative;
    }

    .notification-btn {
      background: none;
      border: none;
      padding: 0.5rem;
      cursor: pointer;
      color: var(--text-secondary);
      position: relative;
      border-radius: var(--radius-md);
      transition: var(--transition);
    }

    .notification-btn:hover {
      background: var(--glass-bg);
      color: var(--text-primary);
    }

    .notification-btn svg {
      width: 22px;
      height: 22px;
    }

    .notification-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 18px;
      height: 18px;
      background: var(--chart-danger);
      border-radius: 50%;
      font-size: 0.625rem;
      font-weight: 600;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .notification-dropdown {
      position: absolute;
      top: calc(100% + 0.5rem);
      right: 0;
      width: 320px;
      background: var(--glass-bg);
      border-radius: var(--radius-glass);
      backdrop-filter: blur(12px);
      box-shadow: var(--glass-shadow);
      border: 1px solid var(--glass-border);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: var(--transition);
      z-index: 100;
    }

    .notification-dropdown.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .notification-header {
      padding: 1rem;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .notification-header h3 {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .mark-read {
      font-size: 0.75rem;
      color: var(--chart-primary);
      cursor: pointer;
      background: none;
      border: none;
      font-weight: 500;
    }

    .notification-list {
      max-height: 300px;
      overflow-y: auto;
    }

    .notification-item {
      padding: 1rem;
      border-bottom: 1px solid var(--glass-border);
      cursor: pointer;
      transition: var(--transition);
    }

    .notification-item:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .notification-item:last-child {
      border-bottom: none;
    }

    .notification-item.unread {
      background: rgba(43, 176, 237, 0.1);
    }

    .notification-item h4 {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .notification-item p {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .notification-time {
      font-size: 0.625rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .profile-section {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: var(--transition);
    }

    .profile-section:hover {
      background: var(--glass-bg);
    }

    .profile-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #2BB0ED, #8b5cf6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 0.875rem;
      box-shadow: 0 4px 15px rgba(43, 176, 237, 0.3);
    }

    .profile-info {
      display: none;
    }

    @media (min-width: 768px) {
      .profile-info {
        display: block;
      }
    }

    .profile-name {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-primary);
    }

    .profile-role {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    /* ===== CONTENT WRAPPER ===== */
    .content-wrapper {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
      background: linear-gradient(135deg, #1E3A5F 0%, #16324F 50%, #0F2C4D 100%);
    }

    .content-header {
      margin-bottom: 1.5rem;
    }

    .welcome-text {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .welcome-subtitle {
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    /* ===== DASHBOARD CARDS ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-radius: var(--radius-glass);
      padding: 1.25rem;
      box-shadow: var(--glass-shadow);
      border: 1px solid var(--glass-border);
      transition: var(--transition);
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      border-color: rgba(43, 176, 237, 0.3);
    }

    .stat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stat-icon svg {
      width: 24px;
      height: 24px;
    }

    .stat-icon.blue {
      background: rgba(43, 176, 237, 0.2);
      color: var(--chart-primary);
    }

    .stat-icon.green {
      background: rgba(34, 197, 94, 0.2);
      color: var(--chart-success);
    }

    .stat-icon.orange {
      background: rgba(250, 204, 21, 0.2);
      color: var(--chart-warning);
    }

    .stat-icon.purple {
      background: rgba(168, 85, 247, 0.2);
      color: #a855f7;
    }

    .stat-trend {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .stat-trend.up {
      color: var(--chart-success);
    }

    .stat-trend.down {
      color: var(--chart-danger);
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .stat-label {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    /* ===== PROGRESS BAR ===== */
    .progress-container {
      margin-top: 1rem;
    }

    .progress-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--glass-border);
    }

    .progress-fill {
      height: 100%;
      border-radius: var(--radius-lg);
      transition: width 1s ease-out;
    }

    .progress-fill.blue {
      background: linear-gradient(90deg, #2BB0ED, #38C6F4);
    }

    .progress-fill.green {
      background: linear-gradient(90deg, #22C55E, #4ade80);
    }

    /* ===== CONTENT GRID ===== */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    @media (min-width: 1024px) {
      .content-grid {
        grid-template-columns: 2fr 1fr;
      }
    }

    /* ===== CARD STYLES ===== */
    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-radius: var(--radius-glass);
      box-shadow: var(--glass-shadow);
      border: 1px solid var(--glass-border);
      overflow: hidden;
    }

    .card-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .card-action {
      font-size: 0.75rem;
      color: var(--chart-primary);
      cursor: pointer;
      background: none;
      border: none;
      font-weight: 500;
      transition: var(--transition);
    }

    .card-action:hover {
      color: #38C6F4;
    }

    .card-body {
      padding: 1.25rem;
    }

    /* ===== MARKS TABLE ===== */
    .marks-table {
      width: 100%;
      border-collapse: collapse;
    }

    .marks-table th,
    .marks-table td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--grid-line);
    }

    .marks-table th {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.03);
    }

    .marks-table td {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .marks-table tr:last-child td {
      border-bottom: none;
    }

    .marks-table tr:hover td {
      background: rgba(255, 255, 255, 0.05);
    }

    .grade-badge {
      padding: 0.25rem 0.75rem;
      border-radius: var(--radius-lg);
      font-size: 0.75rem;
      font-weight: 600;
    }

    .grade-badge.a {
      background: rgba(34, 197, 94, 0.2);
      color: var(--chart-success);
    }

    .grade-badge.b {
      background: rgba(43, 176, 237, 0.2);
      color: var(--chart-primary);
    }

    .grade-badge.c {
      background: rgba(250, 204, 21, 0.2);
      color: var(--chart-warning);
    }

    /* ===== ANNOUNCEMENTS ===== */
    .announcement-item {
      padding: 1rem;
      border-bottom: 1px solid var(--grid-line);
      transition: var(--transition);
    }

    .announcement-item:last-child {
      border-bottom: none;
    }

    .announcement-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .announcement-type {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: var(--radius-sm);
      font-size: 0.625rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .announcement-type.urgent {
      background: rgba(255, 107, 107, 0.2);
      color: var(--chart-danger);
    }

    .announcement-type.info {
      background: rgba(43, 176, 237, 0.2);
      color: var(--chart-primary);
    }

    .announcement-type.event {
      background: rgba(168, 85, 247, 0.2);
      color: #a855f7;
    }

    .announcement-title {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .announcement-date {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    /* ===== ASSIGNMENT SECTION ===== */
    .assignment-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .assignment-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: var(--radius-md);
      border: 1px solid var(--glass-border);
    }

    .assignment-info h4 {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .assignment-info p {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .assignment-status {
      padding: 0.25rem 0.75rem;
      border-radius: var(--radius-lg);
      font-size: 0.75rem;
      font-weight: 500;
    }

    .assignment-status.pending {
      background: rgba(250, 204, 21, 0.2);
      color: var(--chart-warning);
    }

    .assignment-status.submitted {
      background: rgba(34, 197, 94, 0.2);
      color: var(--chart-success);
    }

    .submit-btn {
      padding: 0.5rem 1rem;
      background: linear-gradient(135deg, #2BB0ED 0%, #1994D6 100%);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }

    .submit-btn:hover {
      background: linear-gradient(135deg, #38C6F4 0%, #2BB0ED 100%);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(43, 176, 237, 0.3);
    }

    /* ===== FILE UPLOAD ===== */
    .file-upload-area {
      border: 2px dashed var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 1rem;
      background: rgba(255, 255, 255, 0.02);
    }

    .file-upload-area:hover {
      border-color: var(--chart-primary);
      background: rgba(43, 176, 237, 0.1);
    }

    .file-upload-area.dragover {
      border-color: var(--chart-primary);
      background: rgba(43, 176, 237, 0.15);
    }

    .upload-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 1rem;
      color: var(--text-muted);
    }

    .upload-text {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .upload-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .file-input {
      display: none;
    }

    .uploaded-file {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      background: rgba(43, 176, 237, 0.1);
      border-radius: var(--radius-md);
      margin-top: 1rem;
      border: 1px solid rgba(43, 176, 237, 0.2);
    }

    .uploaded-file svg {
      width: 20px;
      height: 20px;
      color: var(--chart-primary);
    }

    .uploaded-file span {
      flex: 1;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .remove-file {
      background: none;
      border: none;
      color: var(--chart-danger);
      cursor: pointer;
      padding: 0.25rem;
      transition: var(--transition);
    }

    .remove-file:hover {
      transform: scale(1.1);
    }

    /* ===== TIMETABLE ===== */
    .timetable-grid {
      display: grid;
      gap: 0.5rem;
    }

    .timetable-slot {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: var(--radius-md);
      border-left: 3px solid var(--chart-primary);
      border: 1px solid var(--glass-border);
      border-left: 3px solid var(--chart-primary);
    }

    .slot-time {
      font-size: 0.75rem;

    .sidebar-overlay {

      opacity: 1;
    }

      .sidebar {
        position: fixed;

        display: none;

        display: flex;
      }

      }

        grid-template-columns: 1fr;
      }
    }

    .section-content {
      display: none;
    }

    .section-content.active {
      display: block;
    }

    /* ===== FEES SECTION ===== */
    .fee-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .fee-card {
      padding: 1.25rem;
      border-radius: var(--radius-glass);
      text-align: center;
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
    }

      color: var(--chart-danger);
      border-color: rgba(255, 107, 107, 0.2);

      font-weight: 700;
      margin-bottom: 0.25rem;
    }

      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

      margin-top: 1.5rem;
    }

      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      border-bottom: 1px solid var(--grid-line);
    }

    .fee-history-item:last-child {
      border-bottom: none;
    }

    .profile-card {
      text-align: center;
      padding: 2rem;
    }

    .profile-avatar-large {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #2BB0ED, #8b5cf6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      color: white;
      font-size: 2.5rem;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(43, 176, 237, 0.3);
    }

    .profile-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
      text-align: left;
    }

    .profile-field {
      padding: 1rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: var(--radius-md);
      border: 1px solid var(--glass-border);
    }

    .profile-field-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }

    .profile-field-value {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-in {
      animation: fadeIn 0.3s ease-out forwards;
    }

    /* ===== TOAST NOTIFICATION ===== */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 1rem 1.5rem;
      background: var(--glass-bg);
      color: white;
      border-radius: var(--radius-glass);
      box-shadow: var(--glass-shadow);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transform: translateY(100px);
      opacity: 0;
      transition: var(--transition);
      z-index: 1000;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success {
      background: rgba(34, 197, 94, 0.15);
      border-color: rgba(34, 197, 94, 0.3);
      color: var(--chart-success);
    }

    .toast.error {
      background: rgba(255, 107, 107, 0.15);
      border-color: rgba(255, 107, 107, 0.3);
      color: var(--chart-danger);
    }

    .toast svg {
      width: 20px;
      height: 20px;
    }

    function renderAssignmentsContent() {
      return `
        <div class="content-header animate-in">
          <h2 class="welcome-text">Assignments 📝</h2>
          <p class="welcome-subtitle">Manage and submit your assignments</p>
        </div>

        <div class="content-grid">
          <div class="card animate-in">
            <div class="card-header">
              <h3 class="card-title">Your Assignments</h3>
            </div>
            <div class="card-body">
              <div class="assignment-list" id="assignmentList">
                ${assignmentsData.map(assignment => `
                  <div class="assignment-item" data-id="${assignment.id}">
                    <div class="assignment-info">
                      <h4>${assignment.title}</h4>
                      <p>${assignment.subject} • ${assignment.dueDate}</p>
                    </div>
                    ${assignment.status === 'pending' ? `
                      <button class="submit-btn" onclick="openSubmitModal(${assignment.id})">Submit</button>

            <div class="card-body">
              <div class="file-upload-area" id="fileUploadArea">
                <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />

    function renderTimetableContent() {
      const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
      const today = new Date().getDay();
      const currentDay = days[today === 0 || today === 6 ? 0 : today - 1];

      return `
        <div class="content-header animate-in">
          <h2 class="welcome-text">Class Timetable 📅</h2>
          <p class="welcome-subtitle">Your weekly schedule at a glance</p>
        </div>

        <div class="card animate-in">
          <div class="card-header">
            <h3 class="card-title">Today's Schedule - ${currentDay}</h3>
          </div>
          <div class="card-body">
            <div class="timetable-grid">
              ${timetableData.map(slot => `
                <div class="timetable-slot" style="${slot.subject === 'Break' || slot.subject === 'Lunch' ? 'background: #fef3c7; border-color: #f59e0b;' : ''}">
                  <span class="slot-time">${slot.time}</span>
                  <div>
                    <div class="slot-subject">${slot.subject}</div>
                    ${slot.teacher ? `<div class="slot-teacher">${slot.teacher}</div>` : ''}

    function renderFeesContent() {
      return `
        <div class="content-header animate-in">
          <h2 class="welcome-text">Fee Management 💳</h2>
          <p class="welcome-subtitle">View your fee status and payment history</p>
        </div>

        <div class="fee-summary">
          <div class="fee-card total animate-in">
            <div class="fee-amount">$${feesData.total.toLocaleString()}</div>
            <div class="fee-label">Total Fees</div>
          </div>
          <div class="fee-card paid animate-in" style="animation-delay: 0.1s">
            <div class="fee-amount">$${feesData.paid.toLocaleString()}</div>
            <div class="fee-label">Amount Paid</div>
          </div>
          <div class="fee-card pending animate-in" style="animation-delay: 0.2s">
            <div class="fee-amount">$${feesData.pending.toLocaleString()}</div>
            <div class="fee-label">Pending</div>
          </div>
        </div>

        <div class="card animate-in" style="animation-delay: 0.3s">
          <div class="card-header">
            <h3 class="card-title">Payment History</h3>
          </div>
          <div class="card-body" style="padding: 0;">
            <table class="marks-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Description</th>
                  <th>Amount</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                ${feesData.history.map(fee => `
                  <tr>
                    <td>${fee.date}</td>
                    <td>${fee.description}</td>
                    <td>$${fee.amount.toLocaleString()}</td>
                    <td>
                      <span class="assignment-status ${fee.status}">
                        ${fee.status === 'paid' ? '✓ Paid' : '⏳ Pending'}

    function renderAnnouncementsContent() {
      return `
        <div class="content-header animate-in">
          <h2 class="welcome-text">Announcements 📢</h2>
          <p class="welcome-subtitle">Stay updated with the latest news</p>
        </div>

        <div class="card animate-in">
          <div class="card-body" style="padding: 0;">
            ${announcementsData.map((ann, index) => `
              <div class="announcement-item" style="animation-delay: ${index * 0.1}s">
                <span class="announcement-type ${ann.type}">${ann.type}</span>
                <h4 class="announcement-title">${ann.title}</h4>
                <p class="announcement-date">${ann.date}</p>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderProfileContent() {
      const studentName = config.student_name || defaultConfig.student_name;
      const initials = studentName.split(' ').map(n => n[0]).join('').toUpperCase();
      
      return `
        <div class="content-header animate-in">
          <h2 class="welcome-text">My Profile 👤</h2>
          <p class="welcome-subtitle">View and manage your personal information</p>
        </div>

        <div class="card animate-in">
          <div class="profile-card">
            <div class="profile-avatar-large">${initials}</div>
            <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem;">${studentName}</h2>
            <p style="color: var(--text-secondary);">${profileData.studentId} • ${profileData.department}</p>
            
            <div class="profile-details">
              <div class="profile-field">
                <div class="profile-field-label">Email</div>
                <div class="profile-field-value">${profileData.email}</div>
              </div>
              <div class="profile-field">
                <div class="profile-field-label">Phone</div>
                <div class="profile-field-value">${profileData.phone}</div>
              </div>
              <div class="profile-field">
                <div class="profile-field-label">Year</div>
                <div class="profile-field-value">${profileData.year}</div>
              </div>
              <div class="profile-field">
                <div class="profile-field-label">Date of Birth</div>
                <div class="profile-field-value">${profileData.dateOfBirth}</div>
              </div>
              <div class="profile-field" style="grid-column: 1 / -1;">
                <div class="profile-field-label">Address</div>
                <div class="profile-field-value">${profileData.address}</div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // ===== NAVIGATION FUNCTION =====
    function navigateTo(section) {
      currentSection = section;
      const pageTitle = document.getElementById('pageTitle');
      const contentWrapper = document.getElementById('contentWrapper');

      // Update navigation
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
        if (item.getAttribute('data-section') === section) {
          item.classList.add('active');
        }
      });

      // Update page title
      const titles = {
        dashboard: 'Dashboard',
        attendance: 'Attendance',
        marks: 'Marks',
        assignments: 'Assignments',
        timetable: 'Timetable',
        fees: 'Fees',
        announcements: 'Announcements',
        profile: 'Profile'
      };
      pageTitle.textContent = titles[section] || 'Dashboard';

      // Render content
      const contentRenderers = {
        dashboard: renderDashboardContent,
        attendance: renderAttendanceContent,
        marks: renderMarksContent,
        assignments: renderAssignmentsContent,
        timetable: renderTimetableContent,
        fees: renderFeesContent,
        announcements: renderAnnouncementsContent,
        profile: renderProfileContent
      };

      const renderer = contentRenderers[section] || renderDashboardContent;
      contentWrapper.innerHTML = renderer();

      // Animate progress bars
      setTimeout(() => {
        document.querySelectorAll('.progress-fill[data-progress]').forEach(bar => {
          bar.style.width = bar.getAttribute('data-progress') + '%';
        });
      }, 100);

      // Re-attach file upload listeners if on assignments page
      if (section === 'assignments') {
        setupFileUpload();
      }

      // Close mobile sidebar
      closeMobileSidebar();
    }

    // ===== NOTIFICATION FUNCTIONS =====
    function renderNotifications() {
      const notificationList = document.getElementById('notificationList');
      notificationList.innerHTML = notificationsData.map(notification => `
        <div class="notification-item ${notification.unread ? 'unread' : ''}" data-id="${notification.id}">
          <h4>${notification.title}</h4>
          <p>${notification.message}</p>
          <div class="notification-time">${notification.time}</div>
        </div>
      `).join('');
    }

    function toggleNotifications() {
      const dropdown = document.getElementById('notificationDropdown');
      dropdown.classList.toggle('show');
    }

    function markAllRead() {
      notificationsData.forEach(n => n.unread = false);
      document.getElementById('notificationBadge').textContent = '0';
      renderNotifications();
    }

    // ===== SIDEBAR FUNCTIONS =====
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebarCollapsed = !sidebarCollapsed;
      sidebar.classList.toggle('collapsed');
    }

    function toggleMobileSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.toggle('mobile-open');
      overlay.classList.toggle('show');
    }

    function closeMobileSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.remove('mobile-open');
      overlay.classList.remove('show');
    }

    // ===== FILE UPLOAD FUNCTIONS =====
    function setupFileUpload() {
      const uploadArea = document.getElementById('fileUploadArea');
      const fileInput = document.getElementById('fileInput');
      const submitBtn = document.getElementById('submitFilesBtn');

      if (!uploadArea || !fileInput) return;

      uploadArea.addEventListener('click', () => fileInput.click());

      uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
      });

      uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('dragover');
      });

      uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
      });

      fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
      });

      submitBtn.addEventListener('click', () => {
        if (uploadedFiles.length > 0) {
          showToast('Files submitted successfully!', 'success');
          uploadedFiles = [];
          renderUploadedFiles();
        }
      });
    }

    function handleFiles(files) {
      Array.from(files).forEach(file => {
        if (file.size <= 10 * 1024 * 1024) {
          uploadedFiles.push(file);
        }
      });
      renderUploadedFiles();
    }

    function renderUploadedFiles() {
      const container = document.getElementById('uploadedFiles');
      const submitBtn = document.getElementById('submitFilesBtn');

      if (!container) return;

      container.innerHTML = uploadedFiles.map((file, index) => `
        <div class="uploaded-file">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          <span>${file.name}</span>
          <button class="remove-file" onclick="removeFile(${index})">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      `).join('');

      if (submitBtn) {
        submitBtn.disabled = uploadedFiles.length === 0;
      }
    }

    function removeFile(index) {
      uploadedFiles.splice(index, 1);
      renderUploadedFiles();
    }

    function openSubmitModal(assignmentId) {
      const assignment = assignmentsData.find(a => a.id === assignmentId);
      if (assignment) {
        showToast(`Submitting: ${assignment.title}`, 'success');
        assignment.status = 'submitted';
        navigateTo('assignments');
      }
    }

    // ===== TOAST FUNCTION =====
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toastMessage');
      
      toast.className = `toast ${type}`;
      toastMessage.textContent = message;
      toast.classList.add('show');

      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // ===== UPDATE UI FUNCTION =====
    function updateUI() {
      const studentName = config.student_name || defaultConfig.student_name;
      const initials = studentName.split(' ').map(n => n[0]).join('').toUpperCase();
      
      // Update navbar profile
      const navProfileName = document.getElementById('navProfileName');
      const profileAvatar = document.getElementById('profileAvatar');
      
      if (navProfileName) navProfileName.textContent = studentName;
      if (profileAvatar) profileAvatar.textContent = initials;
      
      // Re-render current section to update content
      navigateTo(currentSection);
    }

    // ===== ELEMENT SDK INTEGRATION =====
    async function onConfigChange(newConfig) {
      config = { ...defaultConfig, ...newConfig };
      updateUI();
    }

    function mapToCapabilities(cfg) {
      return {
        recolorables: [],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(cfg) {
      return new Map([
        ['student_name', cfg.student_name || defaultConfig.student_name],
        ['welcome_message', cfg.welcome_message || defaultConfig.welcome_message]
      ]);
    }

    // ===== INITIALIZATION =====
    document.addEventListener('DOMContentLoaded', function() {
      // Render initial content
      renderNavigation();
      renderNotifications();
      navigateTo('dashboard');

      // Event Listeners
      document.getElementById('sidebarToggle').addEventListener('click', toggleSidebar);
      document.getElementById('mobileToggle').addEventListener('click', toggleMobileSidebar);
      document.getElementById('sidebarOverlay').addEventListener('click', closeMobileSidebar);
      document.getElementById('notificationBtn').addEventListener('click', toggleNotifications);
      document.getElementById('markAllRead').addEventListener('click', markAllRead);
      document.getElementById('profileBtn').addEventListener('click', () => navigateTo('profile'));

      // Close notifications when clicking outside
      document.addEventListener('click', (e) => {
        const notificationWrapper = document.querySelector('.notification-wrapper');
        if (!notificationWrapper.contains(e.target)) {
          document.getElementById('notificationDropdown').classList.remove('show');
        }
      });

      // Initialize Element SDK
      if (window.elementSdk) {
        window.elementSdk.init({
          defaultConfig,
          onConfigChange,
          mapToCapabilities,
          mapToEditPanelValues
        });
      }
    });

    // Make navigateTo available globally
    window.navigateTo = navigateTo;
    window.openSubmitModal = openSubmitModal;
